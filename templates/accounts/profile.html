{% extends "base.html" %}
{% block title %}Profile — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
  <h1 class="text-3xl font-bold tracking-tight">Profile</h1>
  <form method="post" enctype="multipart/form-data" class="mt-6 glass rounded-3xl p-6 space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="mb-1 block text-sm font-medium" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="mt-1 text-xs text-rose-500">{{ field.errors|striptags }}</p>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn-primary">Save changes</button>
  </form>
</div>
{% endblock %}
