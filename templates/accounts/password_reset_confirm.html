{% extends "base.html" %}
{% block title %}New password — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-md pt-10">
  <div class="glass-strong rounded-3xl p-8">
    <h1 class="text-2xl font-bold">Choose a new password</h1>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn-primary w-full">Update password</button>
    </form>
  </div>
</div>
{% endblock %}
