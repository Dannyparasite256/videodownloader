{% extends "base.html" %}
{% block title %}Reset password — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-md pt-10">
  <div class="glass-strong rounded-3xl p-8">
    <h1 class="text-2xl font-bold">Reset password</h1>
    <p class="mt-1 text-sm text-slate-500">We'll email you a reset link.</p>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn-primary w-full">Send link</button>
    </form>
  </div>
</div>
{% endblock %}
