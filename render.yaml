# Render Blueprint — VideoDL Pro (Free tier, SQLite)
# https://render.com/docs/blueprint-spec
#
# No managed Postgres (avoids "one free database" limit).
# SQLite file is ephemeral on Free: lost on spin-down / redeploy.
# Redis kept for cache/WebSockets if free Key Value is still available.
#
# Login (change after first open):
#   admin / ChangeMeNow123!

services:
  - type: redis
    name: videodl-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: videodl-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash scripts/render_start_web.sh
    healthCheckPath: /api/v1/health/
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"
      # SQLite (no free Postgres required)
      - key: DATABASE_URL
        value: "sqlite:////app/db.sqlite3"
      - key: DOWNLOAD_ROOT
        value: /app/media/downloads
      - key: MEDIA_ROOT
        value: /app/media
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: REDIS_URL
        fromService:
          name: videodl-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: videodl-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: videodl-redis
          type: redis
          property: connectionString
      - key: CHANNELS_REDIS_URL
        fromService:
          name: videodl-redis
          type: redis
          property: connectionString
      - key: SITE_NAME
        value: VideoDL Pro
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: ChangeMeNow123!
