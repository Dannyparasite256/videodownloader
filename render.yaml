# Render Blueprint — VideoDL Pro
# https://render.com/docs/blueprint-spec
#
# Free-tier stack (no persistent disk — Free web services cannot attach disks):
#   - PostgreSQL (free)
#   - Redis / Key Value (free)
#   - Web Docker (Django + Daphne + FFmpeg)
#
# Downloads run on the web service (eager Celery). Files are ephemeral on Free
# (lost on spin-down/redeploy). Paid plan + disk if you need permanent files.
#
# Admin login (set once in Dashboard env, or use defaults below for first boot):
#   DJANGO_SUPERUSER_USERNAME / DJANGO_SUPERUSER_PASSWORD / DJANGO_SUPERUSER_EMAIL

databases:
  - name: videodl-db
    plan: free
    databaseName: videodl
    user: videodl

services:
  - type: redis
    name: videodl-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: videodl-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash scripts/render_start_web.sh
    healthCheckPath: /api/v1/health/
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"
      # Ephemeral paths (Free tier has no persistent disk)
      - key: DOWNLOAD_ROOT
        value: /opt/render/project/src/media/downloads
      - key: MEDIA_ROOT
        value: /opt/render/project/src/media
      # Run downloads in-process so files stay on this service
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: videodl-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: videodl-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: videodl-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: videodl-redis
          type: redis
          property: connectionString
      - key: CHANNELS_REDIS_URL
        fromService:
          name: videodl-redis
          type: redis
          property: connectionString
      - key: SITE_NAME
        value: VideoDL Pro
      # First-boot admin (CHANGE after first login). Free tier has no Shell.
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: ChangeMeNow123!
