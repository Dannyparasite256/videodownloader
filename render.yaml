# Render Blueprint — VideoDL Pro (Free tier, SQLite, no Redis required)
# https://render.com/docs/blueprint-spec
#
# Minimal free stack to avoid:
#   - free Postgres limit (1 per account)
#   - free Redis limit (1 per account)
#   - persistent disk (not allowed on free web)
#
# SQLite + media are ephemeral (reset on sleep/redeploy).
# Login: admin / ChangeMeNow123!  (change after first login)

services:
  - type: web
    name: videodl-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash scripts/render_start_web.sh
    healthCheckPath: /api/v1/health/
    envVars:
      - key: RENDER
        value: "true"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        value: "sqlite:////app/db.sqlite3"
      - key: FORCE_SQLITE
        value: "True"
      - key: RENDER_USE_SQLITE
        value: "True"
      - key: DOWNLOAD_ROOT
        value: /app/media/downloads
      - key: MEDIA_ROOT
        value: /app/media
      # Downloads run in-process (no Celery worker / Redis needed)
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: REDIS_URL
        value: "redis://127.0.0.1:6379/0"
      - key: SITE_NAME
        value: VideoDL Pro
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: ChangeMeNow123!
