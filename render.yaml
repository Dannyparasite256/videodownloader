# VideoDL Pro — Render Free tier (optimized)
# https://render.com/docs/blueprint-spec
#
# Compatible free stack:
#   - 1 free web service (Docker + FFmpeg + Node for yt-dlp EJS)
#   - SQLite (no free Postgres slot needed)
#   - No Redis, no persistent disk
#
# After deploy, set YTDLP_COOKIES_BASE64 in Dashboard for YouTube
# (see scripts/set_render_cookies.ps1). Create the first admin user from the
# Render Shell; never store a default administrator password in this file.

services:
  - type: web
    name: videodl-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash scripts/render_start_web.sh
    healthCheckPath: /api/v1/health/
    envVars:
      - key: RENDER
        value: "true"
      - key: RENDER_FREE_TIER
        value: "True"
      - key: DJANGO_DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        value: "sqlite:////app/db.sqlite3"
      - key: FORCE_SQLITE
        value: "True"
      - key: RENDER_USE_SQLITE
        value: "True"
      - key: DOWNLOAD_ROOT
        value: /app/media/downloads
      - key: MEDIA_ROOT
        value: /app/media
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: REDIS_URL
        value: "redis://127.0.0.1:6379/0"
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "1"
      - key: MAX_DOWNLOAD_SIZE_MB
        value: "512"
      - key: YTDLP_SOCKET_TIMEOUT
        value: "20"
      - key: YTDLP_RETRIES
        value: "2"
      - key: AXES_FAILURE_LIMIT
        value: "15"
      - key: SITE_NAME
        value: VideoDL Pro
      # Cookie-free YouTube; WARP SOCKS routes around datacenter IP blocks
      - key: YTDLP_USE_COOKIES
        value: "False"
      - key: ENABLE_WARP_PROXY
        value: "True"
      - key: YTDLP_FORCE_IPV4
        value: "True"
