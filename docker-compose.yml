services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-video_downloader}
      POSTGRES_USER: ${POSTGRES_USER:-vdl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vdl_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vdl} -d ${POSTGRES_DB:-video_downloader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vdl}:${POSTGRES_PASSWORD:-vdl_secret}@db:5432/${POSTGRES_DB:-video_downloader}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHANNELS_REDIS_URL: redis://redis:6379/3
      DOWNLOAD_ROOT: /app/media/downloads
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: celery -A config worker -l info -Q celery,downloads,maintenance,analytics,notifications -c 2
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vdl}:${POSTGRES_PASSWORD:-vdl_secret}@db:5432/${POSTGRES_DB:-video_downloader}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHANNELS_REDIS_URL: redis://redis:6379/3
      DOWNLOAD_ROOT: /app/media/downloads
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vdl}:${POSTGRES_PASSWORD:-vdl_secret}@db:5432/${POSTGRES_DB:-video_downloader}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/static:ro
      - media_data:/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
